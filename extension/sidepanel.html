<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Conference Manager</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="light">
  
  <div id="authView" class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Conference Radar</h1>
        <p>Track deadlines effortlessly</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="signup">Signup</button>
      </div>

      <div class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required/>
        </div>
        <div class="form-group" id="confirmPasswordGroup" style="display: none;">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required/>
        </div>
        <button class="auth-btn" id="loginBtn">Sign In</button>
      </div>

      <div class="auth-error" id="error"></div>
    </div>
  </div>



  <div id = "mainView" style = "display:none;">
      <div class="container">

        <div class="header">
          <div>
            <h1>Add Conference</h1>
          </div>

          <div style="display: flex; gap: 10px; align-items: center;">
            <label class="switch">
              <input type="checkbox" id="themeToggle">
              <span class="slider"></span>
            </label>
            <button id="logoutBtn" class="logout-btn">Logout</button>
          </div>
        </div>


        <div class="card">
          <h2>Conference Meta</h2>
          <div id = "_metafields">
            <div class="field-row">
              <span class="field-label">Short Title *</span>
              <input type="text"  id="short_title">
            </div>

            <div class="field-row">
              <span class="field-label">Long Title *</span>
              <input type="text"  id="long_title">
            </div>

            <div class="field-row">
              <span class="field-label">URL</span>
              <p class="field-value"  id="conf_URL">—</p>
            </div>

            <div class="field-row">
              <span class="field-label">Research Domain *</span>
              <div class="autocomplete">
                <input type="text" id="research_domain"  placeholder="Search and add domain" spellcheck="false" autocomplete="off">
                <div class="suggestions" id="domainSuggestions"></div>
              </div>
            </div>

            <div class="field-row">
              <span class="field-label">Keywords</span>
              <div class="autocomplete tag-input-wrap">
                <div id="kwTags" class="tag-container"></div>
                <input type="text" id="keywords" placeholder="Search and add keyword" spellcheck="false" autocomplete="off">
                <div class="suggestions" id="keywordSuggestions"></div>
              </div>
            </div>
          </div>

        </div>
        <div class="card">
          <h2>Conference Fields</h2>
              <div id = "btn_container">
                  <button class="mybutton" id="abs_deadline"data-mode="new">
                          <div class="row-top">
                              <span class="label">Abstract Deadline</span>
                              <span class="status">Not set</span>
                          </div>
                          <div class="action">Click to select</div>
                  </button>

                  <div class="row">
                  <button class="mybutton" id="abs_time" data-mode="new">
                          <div class="row-top">
                              <span class="label">Abstract Time</span>
                              <span class="status">Not set</span>
                          </div>
                          <div class="action">Click to select</div>
                  </button>
                  <select id="abs_timezone">
                    <option value="AoE" selected>AoE</option>
                    <option value = "PT"> PT </option>
                    <option value = "CET"> CET </option>
                    <option value = "ET"> ET </option>
                    <option value = "GMT"> GMT </option>
                    <option value = "IST"> IST </option>
                  </select>
                  </div>

                  <button class="mybutton" id="paper_deadline" data-mode="new">
                          <div class="row-top">
                              <span class="label">Paper Deadline</span>
                              <span class="status">Not set</span>
                          </div>
                          <div class="action">Click to select</div>
                  </button>

                  <div class="row">
                  <button class="mybutton" id="paper_time" data-mode="new">
                          <div class="row-top">
                              <span class="label">Paper Time</span>
                              <span class="status">Not set</span>
                          </div>
                          <div class="action">Click to select</div>
                  </button>
                  <select id="paper_timezone">
                      <option value="AoE" selected>AoE</option>
                      <option value = "PT"> PT </option>
                      <option value = "CET"> CET </option>
                      <option value = "ET"> ET </option>
                      <option value = "GMT"> GMT </option>
                      <option value = "IST"> IST </option>
                  </select>
                  </div>

                  <button class="mybutton" id="conf_date" data-mode="new">
                          <div class="row-top">
                              <span class="label">Conference Date</span>
                              <span class="status">Not set</span>
                          </div>
                          <div class="action">Click to select</div>
                  </button>
                  <button class="mybutton" id="confer_venue" data-mode="new">
                          <div class="row-top">
                              <span class="label">Conference Venue</span>
                              <span class="status">Not set</span>
                          </div>
                          <div class="action">Click to select</div>
                  </button>
              </div>
        </div>
        
        <button class="primary-btn" id = "submitBtn">Save Conference</button>

        <div id="toast" class="toast"></div>

      </div>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Confirm Logout</h2>
        </div>
        <div class="modal-body">
          <p>⚠️ All unsaved conference drafts will be permanently deleted.</p>
          <p>Are you sure you want to logout?</p>
        </div>
        <div class="modal-footer">
          <button id="cancelLogout" class="modal-btn cancel">Cancel</button>
          <button id="confirmLogout" class="modal-btn logout">Logout</button>
        </div>
      </div>
    </div>

<script src = "sidepanel.js"> </script>

</body>
</html>
